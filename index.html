<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Cinema</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:     #f6d477;
      --gold-dim: #d0a236;
      --cream:    #F5ECD7;
      --bg:       #100C08;
    }

    body {
      background: var(--bg);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      text-align: center;
      padding: 2rem 1rem 0.5rem;
      position: relative;
    }
    header::after {
      content: '';
      display: block;
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 1rem auto 0;
    }
    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--gold);
      text-shadow: 0 0 40px rgba(201,168,76,0.4);
    }
    .subtitle {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #e1bb8c;
      margin-top: 0.35rem;
    }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem 1.2rem;
      justify-content: center;
      align-items: center;
      padding: 1rem 1rem 0;
    }
    .ctrl-group { display: flex; align-items: center; gap: 0.5rem; }
    .ctrl-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }
    select {
      background: #1a1008;
      border: 1px solid var(--gold-dim);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      font-size: 0.74rem;
      padding: 0.35rem 0.7rem;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    select:hover { border-color: var(--gold); }

    button {
      background: #1a1008;
      border: 1px solid var(--gold-dim);
      color: var(--cream);
      font-family: 'DM Mono', monospace;
      font-size: 0.74rem;
      padding: 0.35rem 0.8rem;
      border-radius: 2px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s, background 0.2s, color 0.2s;
      letter-spacing: 0.05em;
    }
    button:hover { border-color: var(--gold); background: #251808; }
    button.active { border-color: var(--gold); background: #2e1f06; color: var(--gold); }

    /* ── Scrubber (vertical, side panel) ── */
    .scrub-label-text {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-dim);
    }
    #scrub-label {
      font-size: 0.6rem;
      color: #9a8060;
      text-align: center;
      line-height: 1.5;
      min-height: 2.4em;
    }
    input[type=range] {
      -webkit-appearance: none;
      appearance: none;
      writing-mode: vertical-lr;
      direction: rtl;
      width: 3px;
      height: 100%;
      min-height: 160px;
      max-height: 340px;
      background: linear-gradient(180deg, var(--gold) var(--pct, 0%), #2a1a08 var(--pct, 0%));
      border-radius: 2px;
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid #100C08;
      box-shadow: 0 0 6px rgba(201,168,76,0.5);
    }
    input[type=range]::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid #100C08;
    }

    /* ── Legend ── */
    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem 1.1rem;
      justify-content: center;
      padding: 0.6rem 1rem 0;
      align-items: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.65rem;
      letter-spacing: 0.09em;
      color: #ae916e;
    }
    .legend-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .legend-sym  { font-size: 0.75rem; line-height: 1; width: 14px; text-align: center; flex-shrink: 0; }
    .legend-sep  { width: 1px; height: 14px; background: #3a2810; margin: 0 0.2rem; }

    /* ── Main layout grid ── */
    #main-layout {
      display: grid;
      grid-template-columns: 120px 1fr 160px;
      gap: 0 1rem;
      max-width: 1180px;
      margin: 0.8rem auto 0;
      padding: 0 1rem;
      align-items: start;
    }

    /* Left panel: scrubber */
    #left-panel {
      position: sticky;
      top: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.7rem;
      padding-top: 0.4rem;
    }

    /* Right panel: stats + chart */
    #right-panel {
      position: sticky;
      top: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      padding-top: 0.4rem;
    }

    /* ── Theatre ── */
    #theatre-wrap {
      position: relative;
      width: 100%;
      min-width: 0;
    }
    svg#theatre {
      width: 100%;
      display: block;
      filter: drop-shadow(0 20px 60px rgba(0,0,0,0.8));
    }

    /* ── Tooltip ── */
    #tooltip {
      position: fixed;
      pointer-events: none;
      background: #140e06f0;
      border: 1px solid var(--gold-dim);
      border-radius: 3px;
      padding: 0.7rem 1rem;
      font-size: 0.68rem;
      line-height: 1.7;
      color: var(--cream);
      max-width: 260px;
      opacity: 0;
      transition: opacity 0.2s;
      z-index: 100;
    }
    #tooltip.visible { opacity: 1; }
    #tooltip .tt-name {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--gold);
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    #tooltip .tt-ann { font-style: normal; font-size: 1rem; }
    #tooltip .tt-genre {
      font-size: 0.58rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    #tooltip .tt-row { display: flex; justify-content: space-between; gap: 1rem; }
    #tooltip .tt-val { color: var(--gold); }

    


    /* ── Rating distribution chart (right panel) ── */
    #dist-wrap { width: 100%; }
    .dist-heading {
      font-size: 0.5rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 0.4rem;
      opacity: 0.7;
    }
    #dist-chart {
      display: block;
      width: 100%;
      overflow: visible;
    }
    /* ── Stats (right panel) ── */
    #stats {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--gold-dim);
    }
    #stats span { color: var(--gold); display: block; font-size: 0.72rem; margin-top: 0.05rem; }
    .stat-row { display: flex; flex-direction: column; }

    /* ── Panel headings ── */
    .panel-heading {
      font-size: 0.5rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold-dim);
      margin-bottom: 0.1rem;
      opacity: 0.7;
    }



    /* ── Screen wash transition ── */
    .screen-wash { transition: fill 0.6s ease; }

    /* ── Always-on halos ── */
    @keyframes pulseGold {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.28; }
    }
    @keyframes pulseRed {
      0%, 100% { opacity: 0.1; }
      50%       { opacity: 0.22; }
    }
    .halo-perfect  { animation: pulseGold 4.5s ease-in-out infinite; }
    .halo-disaster { animation: pulseRed  5.5s ease-in-out infinite; }

    /* ── Seat fade-in ── */
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    .theatregoer { animation: fadeIn 0.4s ease both; }

    /* ── Curtain overlay ── */
    #curtain {
      position: fixed;
      inset: 0;
      z-index: 999;
      pointer-events: all;
      display: flex;
    }
    #curtain.gone { pointer-events: none; }

    .curtain-panel {
      position: relative;
      width: 50%;
      height: 100%;
      overflow: hidden;
      background: #6b0f0f;
    }
    .curtain-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        90deg,
        transparent 0px,
        rgba(0,0,0,0.18) 6px,
        transparent 12px,
        rgba(255,255,255,0.04) 18px,
        transparent 24px
      );
    }
    .curtain-panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        180deg,
        rgba(255,220,180,0.07) 0%,
        transparent 40%,
        rgba(0,0,0,0.22) 100%
      );
    }
    .curtain-panel.left  { border-right: 3px solid #c9a84c; }
    .curtain-panel.right { border-left:  3px solid #c9a84c; }


    .curtain-valance {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 56px;
      z-index: 2;
      background: linear-gradient(180deg, #4a0808 0%, #6b0f0f 100%);
      border-bottom: 2px solid #c9a84c55;
    }
    /* Scalloped bottom edge */
    .curtain-valance::after {
      content: '';
      position: absolute;
      bottom: -14px; left: 0;
      width: 100%; height: 14px;
      background: radial-gradient(circle at 50% 0%, #6b0f0f 70%, transparent 71%) 0 0 / 40px 14px repeat-x;
    }

    @keyframes curtainLeft        { from { transform: translateX(0); } to { transform: translateX(-100%); } }
    @keyframes curtainRight       { from { transform: translateX(0); } to { transform: translateX(100%);  } }
    @keyframes curtainValance     { from { transform: translateY(0); } to { transform: translateY(-100%); } }

    .curtain-panel.left.open  { animation: curtainLeft  0.9s cubic-bezier(0.76,0,0.24,1) 0s forwards; }
    .curtain-panel.right.open { animation: curtainRight 0.9s cubic-bezier(0.76,0,0.24,1) 0s forwards; }
    .curtain-valance.open     { animation: curtainValance 0.9s cubic-bezier(0.76,0,0.24,1) 0s forwards; }

    #curtain.gone { display: none; }
  </style>
</head>
<body>

  <!-- ── Curtain ── -->
  <div id="curtain">
    <div class="curtain-valance"></div>
    <div class="curtain-panel left"></div>
    <div class="curtain-panel right"></div>
  </div>

  <header>
    <div class="title">M Y &nbsp; C I N E M A</div>
    <div class="subtitle">movies i watched &nbsp;·&nbsp; each seat, an experience</div>
  </header>

  <div class="controls">
    <div class="ctrl-group">
      <span class="ctrl-label">Color by</span>
      <select id="colorMode">
        <option value="genre">Main Genre</option>
        <option value="myRating">My Rating</option>
        <option value="avgRating">Avg Rating</option>
        <option value="contentRating">Content Rating</option>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Size by</span>
      <select id="sizeMode">
        <option value="myRating">My Rating</option>
        <option value="avgRating">Avg Rating</option>
        <option value="year">Older = Bigger</option>
        <option value="uniform">Uniform</option>
      </select>
    </div>
    <div class="ctrl-group">
      <span class="ctrl-label">Filter</span>
      <select id="filterMode">
        <option value="all">All Genres</option>
        <option value="Drama">Drama</option>
        <option value="Comedy">Comedy</option>
        <option value="Fantasy">Fantasy</option>
        <option value="Romance">Romance</option>
        <option value="Thriller">Thriller</option>
        <option value="Science Fiction">Sci-Fi</option>
      </select>
    </div>

  </div>

  <div class="legend" id="legend"></div>

  <div id="main-layout">

    <!-- Left panel: vertical timeline scrubber -->
    <div id="left-panel">
      <span class="panel-heading">Timeline</span>
      <input type="range" id="scrubber" min="0" max="55" value="55" style="--pct:0%"
        oninput="this.style.setProperty('--pct', ((1 - this.value/this.max)*100)+'%')">
      <span id="scrub-label">Most recent</span>
    </div>

    <!-- Centre: theatre -->
    <div id="theatre-wrap"><svg id="theatre"></svg></div>

    <!-- Right panel: stats + distribution chart -->
    <div id="right-panel">
      <div id="stats">
        <div class="stat-row">FILMS<span id="s-count">—</span></div>
        <div class="stat-row">MY AVG<span id="s-myrating">— / 5</span></div>
        <div class="stat-row">CROWD AVG<span id="s-avgrating">— / 5</span></div>
        <div class="stat-row">TOP GENRE<span id="s-genre">—</span></div>
      </div>
      <div id="dist-wrap">
        <div class="dist-heading">Rating Distribution</div>
        <svg id="dist-chart"></svg>
      </div>
    </div>

  </div>

  <div id="tooltip"></div>
  <script src="main.js"></script>
  <script>
    // Trigger curtain open shortly after load
    window.addEventListener('DOMContentLoaded', () => {
      const curtain = document.getElementById('curtain');
      // Brief paint delay then open immediately
      requestAnimationFrame(() => requestAnimationFrame(() => {
        curtain.querySelector('.left').classList.add('open');
        curtain.querySelector('.right').classList.add('open');
        curtain.querySelector('.curtain-valance').classList.add('open');
        setTimeout(() => curtain.classList.add('gone'), 1100);
      }));
    });
  </script>
</body>
</html>
